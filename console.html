<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Usage Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .header p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-badge.connected {
            background: #4caf50;
            color: white;
        }

        .status-badge.disconnected {
            background: #f44336;
            color: white;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 2em;
            font-weight: 700;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .metric-subtitle {
            font-size: 0.85em;
            color: #999;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #45a049);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-fill.warning {
            background: linear-gradient(90deg, #ff9800, #f57c00);
        }

        .progress-fill.critical {
            background: linear-gradient(90deg, #f44336, #da190b);
        }

        .system-info {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .info-item {
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }

        .info-label {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .info-value {
            font-size: 1.1em;
            color: #1e3c72;
            font-weight: 600;
            word-break: break-all;
        }

        .gpu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .gpu-card {
            background: #f9f9f9;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 5px;
        }

        .gpu-name {
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .metric-small {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .timestamp {
            text-align: center;
            color: white;
            font-size: 0.9em;
            margin-top: 20px;
            opacity: 0.9;
        }

        .error-message {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Resource Usage Dashboard</h1>
            <p>Real-time system monitoring</p>
            <div class="status-badge disconnected" id="statusBadge">
                ● Connecting...
            </div>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="loading" class="loading">Waiting for data...</div>

        <div id="content" style="display: none;">
            <div class="system-info">
                <h3 style="color: #1e3c72; margin-bottom: 10px;">System Information</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Hostname</div>
                        <div class="info-value" id="hostname">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">IP Address</div>
                        <div class="info-value" id="ip">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Last Updated</div>
                        <div class="info-value" id="lastUpdated">-</div>
                    </div>
                </div>
            </div>

            <div class="dashboard">
                <div class="card">
                    <div class="card-title">CPU Usage</div>
                    <div class="metric-value" id="cpuValue">0%</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="cpuBar" style="width: 0%"></div>
                    </div>
                    <div class="metric-subtitle">Processor utilization</div>
                </div>

                <div class="card">
                    <div class="card-title">Memory Usage</div>
                    <div class="metric-value" id="memoryValue">0 / 0 GB</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="memoryBar" style="width: 0%"></div>
                    </div>
                    <div class="metric-subtitle" id="memoryPercent">0%</div>
                </div>

                <div class="card">
                    <div class="card-title">Disk Usage</div>
                    <div class="metric-value" id="diskValue">0 / 0 GB</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="diskBar" style="width: 0%"></div>
                    </div>
                    <div class="metric-subtitle" id="diskPercent">0%</div>
                </div>

                <div class="card">
                    <div class="card-title">Network Bandwidth</div>
                    <div class="metric-value" id="bandwidthValue">0 Mbps</div>
                    <div class="metric-subtitle">Real-time throughput</div>
                </div>
            </div>

            <div id="gpuSection" style="display: none;">
                <div class="system-info">
                    <h3 style="color: #1e3c72; margin-bottom: 10px;">GPU Information</h3>
                    <div class="gpu-container" id="gpuContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="timestamp" id="timestamp"></div>

    <script>
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//${window.location.host}/resources`);

            ws.onopen = () => {
                console.log('WebSocket connected');
                updateStatus(true);
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    updateDashboard(data);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } catch (error) {
                    console.error('Failed to parse data:', error);
                    showError('Failed to parse data from server');
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateStatus(false);
                showError('WebSocket connection error');
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                updateStatus(false);
                setTimeout(connectWebSocket, 3000);
            };
        }

        function updateStatus(connected) {
            const badge = document.getElementById('statusBadge');
            if (connected) {
                badge.textContent = '● Connected';
                badge.className = 'status-badge connected';
            } else {
                badge.textContent = '● Disconnected';
                badge.className = 'status-badge disconnected';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function getProgressFillClass(percent) {
            if (percent >= 80) return 'critical';
            if (percent >= 60) return 'warning';
            return '';
        }

        function updateDashboard(data) {
            // System info
            document.getElementById('hostname').textContent = data.node || '-';
            document.getElementById('ip').textContent = data.ip || '-';
            
            const timestamp = new Date(data.timestamp);
            document.getElementById('lastUpdated').textContent = timestamp.toLocaleTimeString();
            document.getElementById('timestamp').textContent = `Updated: ${timestamp.toLocaleString()}`;

            // CPU
            const cpuPercent = Math.round(data.cpu * 10) / 10;
            document.getElementById('cpuValue').textContent = cpuPercent + '%';
            const cpuBar = document.getElementById('cpuBar');
            cpuBar.style.width = cpuPercent + '%';
            cpuBar.className = 'progress-fill ' + getProgressFillClass(cpuPercent);

            // Memory
            const memUsage = Math.round(data.memory.usage * 10) / 10;
            const memTotal = Math.round(data.memory.total_memory * 10) / 10;
            const memPercent = Math.round((data.memory.usage / data.memory.total_memory) * 1000) / 10;
            document.getElementById('memoryValue').textContent = memUsage + ' / ' + memTotal + ' GB';
            document.getElementById('memoryPercent').textContent = memPercent + '%';
            const memBar = document.getElementById('memoryBar');
            memBar.style.width = memPercent + '%';
            memBar.className = 'progress-fill ' + getProgressFillClass(memPercent);

            // Disk
            const diskUsage = Math.round(data.disk.usage * 10) / 10;
            const diskTotal = Math.round(data.disk.total * 10) / 10;
            const diskPercent = Math.round((data.disk.usage / data.disk.total) * 1000) / 10;
            document.getElementById('diskValue').textContent = diskUsage + ' / ' + diskTotal + ' GB';
            document.getElementById('diskPercent').textContent = diskPercent + '%';
            const diskBar = document.getElementById('diskBar');
            diskBar.style.width = diskPercent + '%';
            diskBar.className = 'progress-fill ' + getProgressFillClass(diskPercent);

            // Bandwidth
            const bandwidth = data.bandwitdh || 0;
            const bps = bandwidth;
            let displayBandwidth;
            if (bps >= 1e9) {
                displayBandwidth = (bps / 1e9).toFixed(2) + ' Gbps';
            } else if (bps >= 1e6) {
                displayBandwidth = (bps / 1e6).toFixed(2) + ' Mbps';
            } else if (bps >= 1e3) {
                displayBandwidth = (bps / 1e3).toFixed(2) + ' Kbps';
            } else {
                displayBandwidth = bps.toFixed(2) + ' bps';
            }
            document.getElementById('bandwidthValue').textContent = displayBandwidth;

            // GPUs
            if (data.gpus && data.gpus.length > 0) {
                const gpuSection = document.getElementById('gpuSection');
                const gpuContainer = document.getElementById('gpuContainer');
                gpuContainer.innerHTML = '';

                data.gpus.forEach(gpu => {
                    const gpuCard = document.createElement('div');
                    gpuCard.className = 'gpu-card';
                    
                    const vramUsed = Math.round(gpu.vram.usage * 10) / 10;
                    const vramTotal = Math.round(gpu.vram.total * 10) / 10;
                    const vramPercent = Math.round((gpu.vram.usage / gpu.vram.total) * 1000) / 10;
                    const gpuUsagePercent = Math.round(gpu.gpu_usage * 10) / 10;

                    gpuCard.innerHTML = `
                        <div class="gpu-name">GPU ${gpu.idx}: ${gpu.gpu_name}</div>
                        <div class="metric-small">
                            <span>GPU Usage:</span>
                            <strong>${gpuUsagePercent}%</strong>
                        </div>
                        <div class="progress-bar" style="margin-bottom: 8px;">
                            <div class="progress-fill" style="width: ${gpuUsagePercent}%; background: linear-gradient(90deg, #2196F3, #1976D2);"></div>
                        </div>
                        <div class="metric-small">
                            <span>VRAM:</span>
                            <strong>${vramUsed} / ${vramTotal} GB</strong>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${vramPercent}%; background: linear-gradient(90deg, #FF6F00, #E65100);"></div>
                        </div>
                    `;
                    gpuContainer.appendChild(gpuCard);
                });

                gpuSection.style.display = 'block';
            } else {
                document.getElementById('gpuSection').style.display = 'none';
            }
        }

        // Initialize
        connectWebSocket();
    </script>
</body>
</html>

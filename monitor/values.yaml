# Default values for monitor Helm chart

replicaCount: 1

image:
  repository: 0yukali0/monitor
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    add:
      - SYS_ADMIN
  privileged: true
  runAsNonRoot: false

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations:
  - effect: NoSchedule
    operator: Exists
  - effect: NoExecute
    operator: Exists

affinity: {}

# Node metrics collection interval (seconds)
metricsInterval: 1

# Application configuration
app:
  port: 8080
  logLevel: info
